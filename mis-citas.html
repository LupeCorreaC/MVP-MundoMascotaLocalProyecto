```html
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis citas | Mundo Mascota Local</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Mejora visual mínima interna (opcional) -->
    <style>
      .appointments-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        background: #fff;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .empty-state {
        text-align: center;
        margin-top: 30px;
        display: none;
      }

      .btn {
        display: inline-block;
        padding: 10px 20px;
        background: #0c5473;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
      }

      .btn:hover {
        background: #33a9dc;
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->
    <header class="site-header">
      <nav class="navbar container">
        <a href="index.html" class="brand">
          <img src="img/logo-mundo-mascota.png" class="brand__logo" />
          <span class="brand__name">Mundo Mascota Local</span>
        </a>

        <ul class="navbar__menu">
          <li><a href="index.html" class="navbar__link">Inicio</a></li>
          <li><a href="servicios.html" class="navbar__link">Servicios</a></li>
          <li><a href="agendar.html" class="navbar__link">Agendar</a></li>
          <li>
            <a href="mis-citas.html" class="navbar__link active">Mis citas</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- CONTENIDO -->
    <main>
      <section class="section">
        <div class="container">
          <div class="section-heading">
            <span class="eyebrow">Historial</span>
            <h2>Mis citas agendadas</h2>
            <p>Consulta todas las citas que has registrado.</p>
          </div>

          <!-- LISTA DINÁMICA -->
          <div id="appointmentsList" class="appointments-grid"></div>

          <!-- ESTADO VACÍO -->
          <div id="emptyState" class="empty-state">
            <p>No tienes citas registradas aún.</p>
            <a href="servicios.html" class="btn">Buscar servicios</a>
          </div>
        </div>
      </section>
    </main>

    <!-- SCRIPTS -->
    <script src="js/navbar.js"></script>

    <script>
      // Simulación básica de citas (puedes quitar esto cuando conectes backend)
      const citas = JSON.parse(localStorage.getItem("citas")) || [];

      const container = document.getElementById("appointmentsList");
      const empty = document.getElementById("emptyState");

      if (citas.length === 0) {
        empty.style.display = "block";
      } else {
        empty.style.display = "none";

        citas.forEach((cita) => {
          const div = document.createElement("div");
          div.classList.add("card");

          div.innerHTML = `
            <h3>${cita.servicio || "Servicio"}</h3>
            <p><strong>Fecha:</strong> ${cita.fecha || "-"}</p>
            <p><strong>Hora:</strong> ${cita.hora || "-"}</p>
          `;

          container.appendChild(div);
        });
      }
    </script>
  </body>
</html>
```
